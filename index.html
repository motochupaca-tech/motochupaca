<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VXA Player Ultimate</title>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
    #player-container { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="player-container"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('url');

    if (!streamUrl) {
      document.getElementById('player-container').innerHTML = '<div style="color:white; display:flex; justify-content:center; align-items:center; height:100%;">Falta la URL del video. Ejemplo: ?url=https://...</div>';
    } else {
      
      // Apuntamos al proxy inteligente de Vercel que ahora es un Lector de Texto
      const proxiedStreamUrl = '/api/proxy?url=' + encodeURIComponent(streamUrl);

      const playerInstance = new Clappr.Player({
          source: proxiedStreamUrl,
          mimeType: "application/vnd.apple.mpegurl",
          parentId: "#player-container",
          width: '100%',
          height: '100%',
          autoPlay: true,
          mute: false,
          playback: { 
              playInline: true,
              crossOrigin: 'anonymous', // Vital para evitar bloqueos del navegador en los videos directos
              hlsjsConfig: {
                  liveSyncDurationCount: 3,
                  liveMaxLatencyDurationCount: 10
              }
          }
      });

      // Auto-recuperación si el stream se traba
      playerInstance.core.getCurrentPlayback().on(window.Clappr.Events.PLAYBACK_ERROR, function(e) {
          console.warn("Se detectó un micro-corte. Reconectando...", e);
          setTimeout(() => { playerInstance.play(); }, 2000);
      });
    }
  </script>
</body>
</html>
